# Server Configuration
server.port=8080
server.servlet.context-path=/

# Database Connection
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:planyachop;MODE=PostgreSQL;DB_CLOSE_DELAY=-1}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}

# JPA / Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=${SPRING_JPA_HIBERNATE_DIALECT:org.hibernate.dialect.H2Dialect}

# Thymeleaf Configuration
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=file:../frontend/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML

# Static assets served from sibling frontend directory (fallback to classpath)
spring.web.resources.static-locations=file:../frontend/static/,classpath:/static/

# JWT Configuration
jwt.secret=${JWT_SECRET:change-me-at-least-64-characters-long-change-me-please-2026-03-12}
jwt.expiration=${JWT_EXPIRATION_MS:86400000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION_MS:604800000}

# Logging Configuration
logging.level.com.smartrecipe=INFO
logging.level.org.springframework.security=INFO
logging.level.org.springframework.web=INFO

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Application Configuration
spring.application.name=smart-recipe-app
spring.profiles.active=development

# reCAPTCHA
recaptcha.secret=${RECAPTCHA_SECRET:6Ld5X5ksAAAAANd4LByFjr3IT3UlWXvhcPYO3nbD}
recaptcha.verify-url=https://www.google.com/recaptcha/api/siteverify
recaptcha.threshold=${RECAPTCHA_THRESHOLD:0.5}
recaptcha.enabled=${RECAPTCHA_ENABLED:false}

# Default admin seed (overridable via env: ADMIN_USERNAME, ADMIN_PASSWORD, ADMIN_EMAIL)
admin.default.username=admin
admin.default.password=Admin123!
admin.default.email=admin@planyachop.local
