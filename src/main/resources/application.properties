# Server Configuration
server.port=8080
server.servlet.context-path=/

# Database Connection
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/planyachop}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:planyachop}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:K7#mP2$vQ9!nZ}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Thymeleaf Configuration
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML

# JWT Configuration
jwt.secret=${JWT_SECRET:change-me-at-least-64-characters-long-change-me-please-2026-03-12}
jwt.expiration=${JWT_EXPIRATION_MS:86400000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION_MS:604800000}

# Logging Configuration
logging.level.com.smartrecipe=INFO
logging.level.org.springframework.security=INFO
logging.level.org.springframework.web=INFO

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Application Configuration
spring.application.name=smart-recipe-app
spring.profiles.active=development
