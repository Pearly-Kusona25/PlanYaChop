0<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - PlanYaChop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="landing-page home-page-v2">
<nav class="landing-nav">
    <div class="container landing-nav-inner">
        <a class="landing-brand" href="/">
            <span class="brand-icon"><i class="fas fa-carrot"></i></span>
            <span class="brand-text">PlanYaChop <em>AI</em></span>
        </a>
        <ul class="landing-links">
            <li><a href="/">Landing</a></li>
            <li><a class="active" href="/home">Home</a></li>
            <li><a href="/dashboard">Dashboard</a></li>
        </ul>
        <a href="#" class="landing-login-btn" data-action="logout">Logout</a>
    </div>
</nav>

<main class="container py-4 pb-5">
    <section class="dashboard-hero card card-body mb-4">
        <div class="d-flex flex-column flex-lg-row justify-content-between gap-3 align-items-start">
            <div>
                <h1 class="display-6 mb-1">Welcome Home, <span th:text="${username}">Chef</span></h1>
                <p class="mb-0 text-muted">Browse meals, open any recipe, and save favorites.</p>
            </div>
            <div class="home-metrics">
                <span class="badge text-bg-light border">Meals: <strong id="homeMealsCount">0</strong></span>
                <span class="badge text-bg-light border">Favorites: <strong id="homeFavoritesCount">0</strong></span>
            </div>
        </div>
    </section>

    <section class="card card-body mb-4">
        <div class="row g-2 align-items-center">
            <div class="col-12 col-md-8">
                <input id="homeRecipeSearch" type="search" class="form-control" placeholder="Search meals by name or cuisine">
            </div>
            <div class="col-12 col-md-4 text-md-end">
                <button id="homeShowFavoritesOnly" class="btn admin-action-btn-outline">Show Favorites Only</button>
            </div>
        </div>
        <p id="homeRecipeStatus" class="text-muted mb-0 mt-2">Loading meals...</p>
    </section>

    <section>
        <div id="homeMealsGrid" class="home-meals-grid"></div>
    </section>
</main>

<div class="modal fade" id="homeRecipeModal" tabindex="-1" aria-labelledby="homeRecipeModalTitle" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
        <div class="modal-content meal-recipe-modal-content">
            <div class="modal-header meal-recipe-modal-header">
                <div>
                    <span class="section-kicker mb-2 d-inline-block">Recipe</span>
                    <h5 class="modal-title" id="homeRecipeModalTitle">Meal details</h5>
                </div>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body meal-recipe-modal-body">
                <p class="recipe-summary" id="homeRecipeSummary"></p>
                <div class="recipe-meta-v2" id="homeRecipeMeta"></div>
                <div class="recipe-columns-v2">
                    <div>
                        <h6>Ingredients</h6>
                        <ul id="homeRecipeIngredients" class="recipe-list-v2"></ul>
                    </div>
                    <div>
                        <h6>Method</h6>
                        <ol id="homeRecipeSteps" class="recipe-steps-v2"></ol>
                    </div>
                </div>
                <button id="homeModalFavoriteBtn" type="button" class="btn admin-action-btn mt-3">
                    <i class="fas fa-heart"></i> Add to favorites
                </button>
            </div>
        </div>
    </div>
</div>

<div class="home-quick-actions">
    <a href="/dashboard#planner-request" class="home-quick-action">
        <i class="fas fa-calendar-check"></i>
        <span>Meal Planner</span>
    </a>
    <a href="/dashboard#shopping-request" class="home-quick-action">
        <i class="fas fa-cart-shopping"></i>
        <span>Shopping List</span>
    </a>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/theme.js}"></script>
<script th:src="@{/js/auth.js}"></script>
<script th:src="@{/js/home.js}"></script>
<script>
    document.querySelectorAll('[data-action="logout"]').forEach(btn => {
        btn.addEventListener('click', e => {
            e.preventDefault();
            window.authService.logout();
        });
    });
</script>
</body>
</html>
