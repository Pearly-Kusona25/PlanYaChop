<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Recipes - PlanYaChop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="landing-page landing-page-v2 platform-page admin-v3">
<div class="landing-shell">
    <nav class="landing-nav landing-nav-v2">
        <div class="container landing-nav-inner landing-nav-inner-v2 platform-nav-inner">
            <a class="landing-brand landing-brand-v2" href="/admin">
                <span class="brand-icon brand-icon-v2"><i class="fas fa-carrot"></i></span>
                <span class="brand-text brand-text-v2">PlanYaChop <em>AI</em></span>
            </a>
            <ul class="landing-links landing-links-v2 platform-links">
                <li><a href="/">Home</a></li>
                <li><a href="/dashboard">Dashboard</a></li>
                <li><a href="/home">My Meals</a></li>
                <li><a href="/admin">Capabilities</a></li>
                <li><a class="active" href="/admin/recipes">Recipes</a></li>
            </ul>
            <div class="landing-nav-actions">
                <a href="/home" class="landing-login-link">User View</a>
                <a href="/admin" class="landing-login-link">Admin View</a>
                <div class="language-toggle btn-group" role="group" aria-label="Language toggle">
                    <button type="button" class="btn btn-outline-primary active" data-language="en">English</button>
                    <button type="button" class="btn btn-outline-primary" data-language="fr">Francais</button>
                    <button type="button" class="btn btn-outline-primary" data-language="pid">Pidgin</button>
                </div>
                <a href="#" class="landing-login-btn landing-login-btn-v2" data-action="logout">Logout</a>
            </div>
        </div>
    </nav>

    <main class="landing-main-v2 platform-main">
        <section class="landing-section platform-hero admin-hero-v3">
            <div class="container"><div class="platform-intro"><span class="section-kicker">Recipe Management</span><h1>Create, update, and delete recipes.</h1></div></div>
        </section>
        <section class="landing-section pt-0">
            <div class="container">
                <section class="platform-action-grid">
                    <article class="platform-card" id="adminRecipeManager">
                        <div class="admin-panel-head"><h5>Create or Update Recipe</h5></div>
                        <div id="adminRecipeFormAlert" class="alert d-none mb-3" role="alert"></div>
                        <form id="adminCreateRecipeForm" class="admin-control-list">
                            <div><label class="form-label">Recipe title</label><input id="adminRecipeTitle" class="form-control" type="text" required></div>
                            <div><label class="form-label">Description</label><textarea id="adminRecipeDescription" class="form-control" rows="3"></textarea></div>
                            <div class="row g-2">
                                <div class="col-4"><label class="form-label">Prep time</label><input id="adminRecipePrepTime" class="form-control" type="number" min="1" value="15"></div>
                                <div class="col-4"><label class="form-label">Cook time</label><input id="adminRecipeCookTime" class="form-control" type="number" min="1" value="30"></div>
                                <div class="col-4"><label class="form-label">Servings</label><input id="adminRecipeServings" class="form-control" type="number" min="1" value="4"></div>
                            </div>
                            <div class="row g-2">
                                <div class="col-6"><label class="form-label">Difficulty</label><select id="adminRecipeDifficulty" class="form-select"><option value="EASY">EASY</option><option value="MEDIUM">MEDIUM</option><option value="HARD">HARD</option></select></div>
                                <div class="col-6"><label class="form-label">Meal Type</label><select id="adminRecipeMealType" class="form-select"><option value="BREAKFAST">BREAKFAST</option><option value="LUNCH">LUNCH</option><option value="DINNER" selected>DINNER</option><option value="DESSERT">DESSERT</option></select></div>
                            </div>
                            <div><label class="form-label">Cuisine</label><input id="adminRecipeCuisine" class="form-control" type="text"></div>
                            <div><label class="form-label">Tags</label><input id="adminRecipeTags" class="form-control" type="text"></div>
                            <div><label class="form-label">Image URL</label><input id="adminRecipeImageUrl" class="form-control" type="url"></div>
                            <div><label class="form-label">Ingredients (one per line)</label><textarea id="adminRecipeIngredients" class="form-control" rows="4"></textarea></div>
                            <div><label class="form-label">Instructions (one step per line)</label><textarea id="adminRecipeInstructions" class="form-control" rows="4"></textarea></div>
                            <button id="adminCreateRecipeBtn" class="btn admin-action-btn" type="submit"><i class="fas fa-plus"></i> Save Recipe</button>
                        </form>
                    </article>
                    <article class="platform-card" id="adminRecentRecipesSection">
                        <div class="admin-panel-head"><h5>Recently Created Recipes</h5><button id="refreshAdminRecipesBtn" class="btn admin-action-btn-outline btn-sm">Refresh</button></div>
                        <ul id="adminRecentRecipesList" class="admin-activity-list-v3"></ul>
                        <p id="adminRecentRecipesEmpty" class="text-muted small mb-0">No recipes yet.</p>
                    </article>
                </section>
            </div>
        </section>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/theme.js}"></script>
<script th:src="@{/js/auth.js}"></script>
<script th:src="@{/js/language.js}"></script>
<script th:src="@{/js/admin-dashboard.js}"></script>
<script>document.querySelectorAll('[data-action="logout"]').forEach(btn=>btn.addEventListener('click',e=>{e.preventDefault();window.authService.logout();}));</script>
</body>
</html>
